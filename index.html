    <script>
        // No-flash theme resolver - executa antes do body renderizar
        (function() {
            try {
                var stored = localStorage.getItem('theme');
                var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                var resolved = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', resolved);
            } catch (e) { /* localStorage bloqueado - segue default */ }
        })();
    </script>
    <style>
        /* ============================================
           TEMA LIGHT (default)
           ============================================ */
        :root {
            color-scheme: light;

            --bg: #ffffff;
            --bg-2: #f6f8fa;
            --bg-3: #eaeef2;
            --border: #d0d7de;
            --text: #1f2328;
            --text-dim: #656d76;
            --accent: #00875a;
            --accent-dim: #006847;
            --accent-soft: rgba(0, 135, 90, 0.10);
            --accent-border: rgba(0, 135, 90, 0.30);
            --accent-contrast: #ffffff;
            --link: #0969da;
            --code-bg: #eef1f4;

            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.12);
            --shadow-accent: 0 8px 24px rgba(0, 135, 90, 0.20);
            --shadow-ig: 0 6px 16px rgba(225, 48, 108, 0.25);

            --row-hover: #f0f3f6;
            --sticky-bg: rgba(255, 255, 255, 0.85);
            --table-stripe: #f6f8fa;
            --gradient-ig: radial-gradient(circle, rgba(225, 48, 108, 0.06) 0%, transparent 70%);
            --gradient-ig-final: radial-gradient(ellipse at top, rgba(225, 48, 108, 0.10) 0%, transparent 60%);

            --ig-1: #f09433;
            --ig-2: #e6683c;
            --ig-3: #dc2743;
            --ig-4: #cc2366;
            --ig-5: #bc1888;
        }

        /* ============================================
           TEMA DARK (override)
           ============================================ */
        [data-theme="dark"] {
            color-scheme: dark;

            --bg: #0f1419;
            --bg-2: #161b22;
            --bg-3: #1c2128;
            --border: #30363d;
            --text: #e4e6eb;
            --text-dim: #8b949e;
            --accent: #00d9a3;
            --accent-dim: #00b386;
            --accent-soft: rgba(0, 217, 163, 0.12);
            --accent-border: rgba(0, 217, 163, 0.3);
            --accent-contrast: #0a1a14;
            --link: #58a6ff;
            --code-bg: #1c2128;

            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.5);
            --shadow-accent: 0 8px 24px rgba(0, 217, 163, 0.25);
            --shadow-ig: 0 6px 16px rgba(225, 48, 108, 0.40);

            --row-hover: #1c2128;
            --sticky-bg: rgba(15, 20, 25, 0.85);
            --table-stripe: #161b22;
            --gradient-ig: radial-gradient(circle, rgba(225, 48, 108, 0.10) 0%, transparent 70%);
            --gradient-ig-final: radial-gradient(ellipse at top, rgba(225, 48, 108, 0.15) 0%, transparent 60%);
        }

        /* Transicao suave entre temas (com fallback para reduced-motion) */
        body, .sticky-cta, .stat, .feature, .ig-card, .inline-cta, .toc, .step,
        .cat-grid a, .ig-btn, .cta, .footer-avatar, .final-cta {
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        html, body { margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        code { font-family: "SF Mono", Monaco, Menlo, Consolas, "Courier New", monospace; background: var(--bg-3); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        img { display: block; max-width: 100%; }
        .wrap { max-width: 1100px; margin: 0 auto; padding: 64px 24px; }

        /* === STICKY BANNER (topo) === */
        .sticky-cta {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--sticky-bg);
            backdrop-filter: saturate(180%) blur(16px);
            -webkit-backdrop-filter: saturate(180%) blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .sticky-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .sticky-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(45deg, var(--ig-1), var(--ig-2), var(--ig-3), var(--ig-4), var(--ig-5));
            padding: 2px; flex-shrink: 0;
        }
        .sticky-avatar img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--bg);
        }
        .sticky-text { flex: 1; min-width: 200px; font-size: 14px; }
        .sticky-text strong { color: var(--accent); }
        .sticky-text span { color: var(--text-dim); }
        .sticky-btn {
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(45deg, var(--ig-2), var(--ig-4));
            color: #fff; padding: 8px 16px; border-radius: 6px;
            text-decoration: none; font-weight: 600; font-size: 13px;
            transition: transform 0.15s, box-shadow 0.15s;
            white-space: nowrap;
        }
        .sticky-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-ig); }
        .sticky-btn svg { width: 14px; height: 14px; fill: currentColor; }
        .sticky-close {
            background: none; border: none; color: var(--text-dim);
            cursor: pointer; font-size: 20px; line-height: 1; padding: 4px 8px;

        .sticky-close:hover { color: var(--text); }

        /* === THEME TOGGLE (3-vias) === */
        .theme-toggle {
            display: inline-flex;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2px;

        }
        .theme-toggle button {
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: background 0.15s, color 0.15s;
        }
        .theme-toggle button:hover { color: var(--text); }
        .theme-toggle button.active {
            background: var(--bg);
            color: var(--accent);
            box-shadow: var(--shadow-sm);
        }
        .theme-toggle svg { width: 16px; height: 16px; fill: currentColor; display: block; }

        /* === A11Y: prefers-reduced-motion === */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* === PRINT: sempre tema claro, sem sticky/gradientes === */
        @media print {
            :root, [data-theme="dark"] {
                --bg: #ffffff; --bg-2: #ffffff; --bg-3: #f6f8fa;
                --text: #000000; --text-dim: #444444;

            .sticky-cta, .ig-btn, .theme-toggle, .final-cta { display: none !important; }
            body { background: #fff !important; color: #000 !important; }
            a { text-decoration: underline; color: #000 !important; }
            section { break-inside: avoid; page-break-inside: avoid; }
        }

        .badge { display: inline-block; padding: 6px 14px; background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent-border); border-radius: 999px; font-size: 14px; font-weight: 600; letter-spacing: 0.3px; }

        h1 { font-size: clamp(36px, 6vw, 64px); margin: 24px 0 16px; line-height: 1.1; letter-spacing: -1.5px; }
        h1 .accent { color: var(--accent); }
        h2 { font-size: 28px; margin: 0 0 24px; letter-spacing: -0.5px; }
        h3 { font-size: 17px; margin: 0 0 6px; }
        .lead { font-size: 20px; color: var(--text-dim); max-width: 720px; margin: 0 0 40px; }
        .lead strong { color: var(--text); }

        /* HERO STATS */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin: 48px 0; }
        .stat { background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
        .stat .num { font-size: 36px; font-weight: 700; color: var(--accent); line-height: 1; }
        .stat .label { font-size: 14px; color: var(--text-dim); margin-top: 8px; }

        /* CTAs */
        .cta-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .cta { display: inline-block; background: var(--accent); color: #0a1a14; padding: 18px 36px; border-radius: 10px; font-size: 18px; font-weight: 700; text-decoration: none; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 8px 24px rgba(0, 217, 163, 0.25); border: none; cursor: pointer; }
        .cta:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0, 217, 163, 0.35); }
        .cta.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); box-shadow: none; }
        .cta.secondary:hover { border-color: var(--accent); }

        /* SECTIONS */
        section { margin-top: 80px; scroll-margin-top: 24px; }
        .feature-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
        .feature { background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
        .feature .icon { font-size: 28px; margin-bottom: 8px; }
        .feature p { margin: 0; color: var(--text-dim); font-size: 14px; }
        .feature p code { font-size: 12px; }

        /* TOC */
        .toc { background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 24px 28px; }
        .toc ol { margin: 0; padding-left: 20px; columns: 2; column-gap: 32px; }
        .toc li { margin: 6px 0; break-inside: avoid; }
        .toc a { color: var(--text); text-decoration: none; font-size: 14px; }
        .toc a:hover { color: var(--accent); }

        /* CATEGORIES GRID */
        .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-top: 16px; }
        .cat-grid a { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px; text-decoration: none; color: var(--text); font-size: 14px; transition: border-color 0.15s, background 0.15s; }
        .cat-grid a:hover { border-color: var(--accent); background: var(--bg-3); }
        .cat-grid .count { margin-left: auto; color: var(--text-dim); font-size: 12px; font-variant-numeric: tabular-nums; }

        /* USAGE STEPS */
        .steps { counter-reset: step; }
        .step { position: relative; padding: 16px 16px 16px 64px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; }
        .step::before { counter-increment: step; content: counter(step); position: absolute; left: 16px; top: 16px; width: 32px; height: 32px; background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
        .step strong { display: block; margin-bottom: 4px; }
        .step p { margin: 0; color: var(--text-dim); font-size: 14px; }

        /* INLINE CTA (entre seções) */
        .inline-cta {
            background: linear-gradient(135deg, var(--bg-2) 0%, var(--bg-3) 100%);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px 28px;
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
            position: relative;
            overflow: hidden;
        }
        .inline-cta::before {
            content: "";
            position: absolute; top: -50%; right: -10%;
            width: 280px; height: 280px;
            background: var(--gradient-ig);
            pointer-events: none;
        }
        .inline-cta .avatar {
            width: 64px; height: 64px; border-radius: 50%;
            background: linear-gradient(45deg, var(--ig-1), var(--ig-2), var(--ig-3), var(--ig-4), var(--ig-5));
            padding: 2.5px; flex-shrink: 0; position: relative; z-index: 1;

        .inline-cta .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2.5px solid var(--bg); }
        .inline-cta .text { flex: 1; min-width: 220px; position: relative; z-index: 1; }
        .inline-cta .text strong { font-size: 16px; display: block; margin-bottom: 2px; }
        .inline-cta .text span { color: var(--text-dim); font-size: 14px; }

        /* INSTAGRAM BIG CARD */
        .ig-card {
            background: linear-gradient(135deg, var(--bg-2) 0%, var(--bg-3) 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 32px;
            position: relative;
            overflow: hidden;
        }
        .ig-card::before {
            content: "";
            position: absolute;
            top: -50%; right: -20%;

            background: radial-gradient(circle, rgba(225, 48, 108, 0.1) 0%, transparent 70%);

        }
        .ig-avatar {
            width: 128px; height: 128px; border-radius: 50%;
            background: linear-gradient(45deg, var(--ig-1), var(--ig-2), var(--ig-3), var(--ig-4), var(--ig-5));

        .ig-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid var(--bg); }
        .ig-info { flex: 1; min-width: 260px; position: relative; z-index: 1; }
        .ig-info .ig-handle { font-size: 26px; font-weight: 700; margin: 0 0 4px; }
        .ig-info .ig-handle a { color: var(--text); text-decoration: none; }
        .ig-info .ig-handle a:hover { color: var(--accent); }
        .ig-info .ig-bio { color: var(--text-dim); font-size: 15px; margin: 0 0 16px; max-width: 560px; }
        .ig-info .ig-meta { display: flex; gap: 20px; font-size: 13px; color: var(--text-dim); margin-bottom: 20px; flex-wrap: wrap; }
        .ig-info .ig-meta strong { color: var(--text); font-weight: 600; }
        .ig-btn {
            display: inline-flex; align-items: center; gap: 10px;
            background: linear-gradient(45deg, var(--ig-2), var(--ig-4));
            color: #fff; padding: 14px 28px; border-radius: 10px;
            text-decoration: none; font-weight: 700; font-size: 16px;
            transition: transform 0.15s, box-shadow 0.15s;
            position: relative; z-index: 1;
        }
        .ig-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-ig); }
        .ig-btn svg { width: 20px; height: 20px; fill: currentColor; }
        .ig-tip { background: var(--bg-3); border-left: 3px solid var(--accent); padding: 14px 18px; border-radius: 4px; font-size: 14px; color: var(--text-dim); margin-top: 20px; }
        .ig-tip strong { color: var(--accent); }

        /* FINAL BIG CTA */
        .final-cta {
            text-align: center;
            background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
            border: 1px solid var(--accent-border);
            border-radius: 20px;
            padding: 48px 32px;
            position: relative;
            overflow: hidden;
        }
        .final-cta::before {
            content: "";
            position: absolute; inset: 0;
            background: var(--gradient-ig-final);
            pointer-events: none;
        }
        .final-cta .big-avatar {
            width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 20px;
            background: linear-gradient(45deg, var(--ig-1), var(--ig-2), var(--ig-3), var(--ig-4), var(--ig-5));

        .final-cta .big-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--bg); }
        .final-cta h2 { font-size: 32px; margin: 0 0 12px; position: relative; z-index: 1; }
        .final-cta p { color: var(--text-dim); max-width: 600px; margin: 0 auto 28px; position: relative; z-index: 1; }
        .final-cta .ig-btn { font-size: 18px; padding: 16px 36px; }
        .final-cta .ig-btn svg { width: 22px; height: 22px; }

        /* FOOTER */
        footer { margin-top: 80px; padding-top: 32px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 14px; }
        footer a { color: var(--link); text-decoration: none; }
        footer a:hover { text-decoration: underline; }
        footer .footer-row { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 16px; align-items: center; }
        footer .footer-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            background: linear-gradient(45deg, var(--ig-1), var(--ig-2), var(--ig-3), var(--ig-4), var(--ig-5));
            padding: 2px; flex-shrink: 0;
        }
        footer .footer-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--bg); }
        footer .footer-author { display: flex; align-items: center; gap: 12px; }
        .pill { display: inline-block; padding: 2px 8px; background: var(--bg-3); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; color: var(--text-dim); margin-left: 6px; }

        @media (max-width: 600px) {
            .wrap { padding: 40px 20px; }
            .toc ol { columns: 1; }
            .ig-card { padding: 24px; }
            .ig-avatar { width: 96px; height: 96px; }
            .final-cta { padding: 32px 20px; }
            .sticky-text { font-size: 13px; }
        }
    </style>
    <script>
        // === Theme controller (3-vias: auto / light / dark) ===
        (function() {
            const STORAGE_KEY = 'theme';
            const root = document.documentElement;
            const mq = window.matchMedia('(prefers-color-scheme: dark)');

            function resolveTheme(mode) {
                if (mode === 'light' || mode === 'dark') return mode;
                return mq.matches ? 'dark' : 'light';
            }

            function applyTheme(mode) {
                root.setAttribute('data-theme', resolveTheme(mode));
                document.querySelectorAll('[data-theme-set]').forEach(btn => {
                    btn.classList.toggle('active', btn.getAttribute('data-theme-set') === mode);
                });
            }

            // Listener: se modo for "auto", reage a mudanca do SO em tempo real
            mq.addEventListener('change', () => {
                const stored = localStorage.getItem(STORAGE_KEY) || 'auto';
                if (stored === 'auto') applyTheme('auto');
            });

            // Click handlers
            document.addEventListener('click', (e) => {
                const btn = e.target.closest('[data-theme-set]');
                if (!btn) return;
                const mode = btn.getAttribute('data-theme-set');
                try { localStorage.setItem(STORAGE_KEY, mode); } catch (_) {}
                applyTheme(mode);
            });

            // Inicializa estado visual dos botoes (ja tem o tema aplicado pelo no-flash)
            const initial = localStorage.getItem(STORAGE_KEY) || 'auto';
            applyTheme(initial);
        })();
    </style>
</head>
